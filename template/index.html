<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="template-version" content="17">
<style>
body{font-family:system-ui,"Segoe UI","Hiragino Kaku Gothic ProN","Noto Sans JP",Meiryo,sans-serif;line-height:1.85;padding:1.2em;background:#121212;color:#e8e8e8;max-width:840px;margin:0 auto;box-sizing:border-box;font-size:17px;position:relative}
h1{color:#ff9800;font-size:1.7em;border-bottom:1px solid #333;padding-bottom:.3em;margin-top:1.2em}
h2{color:#ff9800;font-size:1.32em;border-bottom:1px solid #333;padding-bottom:.3em;margin-top:.3em;margin-bottom:.2em}
h3,h4{color:#ffb74d;font-size:1em;font-weight:700;margin-top:1.5em;margin-bottom:0.3em}
ul{margin-left:1.5em}
li{margin-bottom:.3em}
p{margin:.9em 0}
a{color:#4fc3f7;text-decoration:none}
.timestamp-section{margin:1.2em 0 0;padding-top:1em;border-top:1px solid #2a2a2a}
.timestamp-section:first-of-type{border-top:none;padding-top:.4em}
.timestamp-images{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:.8em}
.thumb-container{position:relative;width:100%;aspect-ratio:16/9;transition:transform 0.2s;display:block;overflow:hidden}
.thumb-container:hover{transform:scale(1.8);z-index:100}
.thumb-container.is-playing,.thumb-container.is-playing:hover{transform:none;transition:none}
.timestamp-images .thumb-container:nth-child(3n+1){transform-origin:left center}
.timestamp-images .thumb-container:nth-child(3n+2){transform-origin:center center}
.timestamp-images .thumb-container:nth-child(3n){transform-origin:right center}
.thumb-img{width:100%;height:100%;object-fit:cover;border-radius:4px;cursor:pointer}
.thumb-container::after{content:'▶';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:rgba(255,255,255,0.4);font-size:24px;background:rgba(0,0,0,0.4);padding:6px 14px;border-radius:50%;pointer-events:none;z-index:3}
.jump-link{background:#333;padding:10px;margin:10px 0;border-radius:5px;text-align:center}
.detail-section{border-top:2px solid #666;margin-top:2em;padding-top:2em}
.video-thumbnail{max-width:640px;width:100%;border-radius:8px;margin:1em 0;box-shadow:0 4px 8px rgba(0,0,0,.3)}
.description-block{background:#1a1a1a;border:1px solid #333;border-radius:6px;padding:12px 16px;margin:1em 0;font-size:0.88em;color:#bbb;line-height:1.7em}
.description-block a{color:#4fc3f7}
.desc-visible{white-space:pre-wrap}
.desc-details{margin-top:6px}
.desc-details summary{cursor:pointer;color:#777;font-size:0.9em;user-select:none;list-style:none;padding:2px 0}
.desc-details summary::before{content:'▶ '}
.desc-details[open] summary::before{content:'▼ '}
.desc-details summary:hover{color:#ccc}
.desc-more{white-space:pre-wrap}
.desc-close-btn{display:block;margin:10px auto 2px;background:none;border:1px solid #555;color:#888;cursor:pointer;font-size:0.85em;padding:3px 16px;border-radius:4px}
.desc-close-btn:hover{color:#ccc;border-color:#aaa}
html{overflow-x:hidden}
.filmstrip-rail{position:absolute;top:0;left:-172px;width:148px;z-index:5}
.filmstrip-frame{position:absolute;left:0;width:148px;height:83px;overflow:hidden;border-radius:4px;cursor:pointer;background:#000;box-shadow:0 1px 4px rgba(0,0,0,.5);transition:width .15s,height .15s}
.filmstrip-frame:hover{width:444px;height:249px;z-index:30}
.filmstrip-frame.is-playing,.filmstrip-frame.is-playing:hover{width:148px;height:83px;transition:none}
.filmstrip-frame img{width:100%;height:100%;object-fit:cover;display:block}
.filmstrip-frame::after{content:'▶';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:rgba(255,255,255,.5);font-size:13px;background:rgba(0,0,0,.4);padding:1px 6px;border-radius:50%;pointer-events:none}
.thumb-container.is-playing::after,.filmstrip-frame.is-playing::after{content:'再生中';font-size:11px;padding:3px 7px}
.global-video-player{position:fixed;z-index:210;display:none;background:#000;border-radius:6px;box-shadow:0 8px 28px rgba(0,0,0,.65)}
.global-video-player.is-visible{display:block}
.global-video-player.is-docked{box-shadow:0 10px 36px rgba(0,0,0,.8),0 0 0 1px #555}
.global-video-viewport{position:absolute;inset:0;overflow:hidden;border-radius:6px;background:#000}
.global-video-player iframe{position:absolute;top:0;left:0;border:0;border-radius:6px;transform-origin:top left}
.global-video-close{position:absolute;z-index:3;top:-11px;right:-11px;width:28px;height:28px;border:1px solid #777;border-radius:50%;background:#202020;color:#fff;font-size:20px;line-height:24px;padding:0;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.7)}
.global-video-close:hover{background:#444}
.global-video-resize{position:absolute;z-index:3;left:-11px;bottom:-11px;width:28px;height:28px;border:1px solid #777;border-radius:50%;background:#202020;color:#ddd;font-size:15px;line-height:25px;padding:0;text-align:center;cursor:nesw-resize;user-select:none;touch-action:none;box-shadow:0 2px 8px rgba(0,0,0,.7)}
.global-video-resize:hover{background:#444;color:#fff}
.transcript-panel{position:fixed;z-index:200;top:12px;right:12px;bottom:12px;width:360px;display:flex;flex-direction:column;background:#181818;border:1px solid #353535;border-radius:12px;box-shadow:0 8px 28px rgba(0,0,0,.45);overflow:hidden;transform:translateX(calc(100% + 24px));transition:transform .2s ease}
.transcript-panel.is-open{transform:translateX(0)}
.transcript-header{height:48px;box-sizing:border-box;flex:0 0 auto;display:flex;align-items:center;gap:8px;padding:0 12px;border-bottom:1px solid #303030;background:#1d1d1d}
.transcript-title{font-size:.95rem;font-weight:700;flex:1}
.transcript-sync-label{font-size:.7rem;color:#888}
.transcript-close{border:0;background:transparent;color:#aaa;font-size:24px;line-height:1;cursor:pointer;padding:4px 6px}
.transcript-list{min-height:0;overflow-y:auto;overscroll-behavior:contain;padding:8px 7px 40vh;scrollbar-color:#666 transparent}
.transcript-cue{display:grid;grid-template-columns:48px 1fr;gap:8px;color:#aaa;padding:8px;border-radius:8px;line-height:1.45;font-size:14px;transition:background .12s,color .12s}
.transcript-cue:hover{color:#eee;background:#292929}
.transcript-cue.is-active{color:#fff;background:#30353a}
.transcript-cue.is-section-start{margin-top:8px;border-top:1px solid #383838;border-radius:0 0 8px 8px;padding-top:14px}
.transcript-time{align-self:start;justify-self:start;color:#aaa;background:#353535;border-radius:10px;padding:1px 6px;font-size:11px;line-height:1.5;font-variant-numeric:tabular-nums}
.transcript-cue.is-active .transcript-time{background:#174d70;color:#bfe7ff}
.transcript-text{min-width:0}
.transcript-toggle{position:fixed;z-index:190;right:14px;bottom:14px;border:1px solid #555;border-radius:22px;background:#242424;color:#eee;padding:9px 14px;box-shadow:0 4px 16px rgba(0,0,0,.4);cursor:pointer}
@media (max-width:1180px){.filmstrip-rail{display:none}}
@media (min-width:1181px){body{max-width:none;margin-left:220px;margin-right:24px}}
@media (min-width:1280px){body{margin-right:400px}.transcript-panel{transform:none}.transcript-toggle,.transcript-close{display:none}}
@media (max-width:1279px){body.transcript-open{overflow:hidden}.transcript-panel{top:8px;right:8px;bottom:8px;width:min(360px,calc(100vw - 16px))}}
</style>
<script src="data.js"></script>
<script>if(typeof PAGE_DATA!=='undefined'&&PAGE_DATA.title)document.title=PAGE_DATA.title;</script>
</head>
<body>
<script>
(function() {
  // --- CONFIG: 表示側で加工する設定 ---
  var CONFIG = {
    proxyDomain: 'www.yout-ube.com',
    embedParams: 'autoplay=1&mute=1'
  };

  // --- ユーティリティ ---
  function escapeHtml(text) {
    var d = document.createElement('div');
    d.appendChild(document.createTextNode(text));
    return d.innerHTML;
  }

  function makeProxyUrl(url) {
    if (!url) return '';
    return url.replace('www.youtube.com/', CONFIG.proxyDomain + '/');
  }

  function makeVideoLink(url, timestampSec) {
    if (!url) return '';
    var proxyUrl = makeProxyUrl(url);
    // &t= が末尾にある場合はそのまま秒数を付ける
    if (proxyUrl.indexOf('&t=') !== -1) {
      // 既に &t= がある場合、末尾の値を置き換え
      return proxyUrl.replace(/&t=.*$/, '&t=' + timestampSec);
    }
    return proxyUrl + (proxyUrl.indexOf('?') !== -1 ? '&' : '?') + 't=' + timestampSec;
  }

  function makeEmbedUrl(videoId, timestampSec) {
    return 'https://www.youtube-nocookie.com/embed/' + videoId + '?start=' + timestampSec + '&autoplay=1&mute=1';
  }

  function extractVideoId(url) {
    if (!url) return '';
    var m = url.match(/[?&]v=([a-zA-Z0-9_-]+)/);
    return m ? m[1] : '';
  }

  function formatTimestamp(sec) {
    if (sec == null) return '';
    var h = Math.floor(sec / 3600);
    var rem = sec % 3600;
    var m = Math.floor(rem / 60);
    var s = rem % 60;
    var pad = s < 10 ? '0' : '';
    if (h) return h + '時間' + m + '分' + pad + s + '秒頃';
    return m + '分' + pad + s + '秒頃';
  }

  function makeChatGptUrl(subtitleText) {
    var prompt = '以下は字幕の一部です。省略を行わずに、読み易い日本語の文章として整理して。\n' +
      '要約をしすぎないで、会話のディティールを残した書き方で。\n' +
      'ただし、長すぎるときは短い見出しなどをつけて読み易く。この指示への返答は不要なので、内容のみを出力して。\n' +
      '---\n\n' + subtitleText;
    return 'https://chatgpt.com/?temporary-chat=true&prompt=' + encodeURIComponent(prompt);
  }

  // --- データのデフォルト値を補完 ---
  var data = (typeof PAGE_DATA !== 'undefined') ? PAGE_DATA : {};
  if (!data.schema_version) data.schema_version = 1;
  if (!data.sections) data.sections = [];
  if (!data.video_id) data.video_id = extractVideoId(data.url || '');
  if (!data.thumbnail) data.thumbnail = 'Thumbnail.jpg';

  var videoId = data.video_id;
  var baseUrl = data.url || '';

  // --- サムネイル動画：特殊URLを使う単一プレイヤー ---
  // 通常のYouTube embedは使わず、従来どおり yout-ube.com のwatch URLを
  // 拡大iframe内へ読み込む。最初のクリックはプレイヤーを開くだけで、
  // 実際の再生ボタンはiframe内で利用者が押す。
  var globalVideo = {
    shell: null,
    viewport: null,
    iframe: null,
    source: null,
    profile: null,
    forceDocked: false,
    userWidth: null,
    scheduled: false
  };
  var keepActiveTranscriptVisible = function() {};

  function ensureGlobalVideoPlayer() {
    if (globalVideo.shell) return;
    var shell = document.createElement('div');
    shell.className = 'global-video-player';
    shell.setAttribute('role', 'dialog');
    shell.setAttribute('aria-label', '動画プレイヤー');

    var viewport = document.createElement('div');
    viewport.className = 'global-video-viewport';
    var iframe = document.createElement('iframe');
    iframe.title = '動画再生';
    iframe.allowFullscreen = true;
    viewport.appendChild(iframe);

    var close = document.createElement('button');
    close.className = 'global-video-close';
    close.type = 'button';
    close.setAttribute('aria-label', '動画を閉じる');
    close.textContent = '×';
    close.addEventListener('click', function(e) {
      e.preventDefault();
      e.stopPropagation();
      stopGlobalVideo();
    });

    var resize = document.createElement('div');
    resize.className = 'global-video-resize';
    resize.setAttribute('role', 'button');
    resize.setAttribute('aria-label', '動画プレイヤーの大きさを変更');
    resize.title = 'ドラッグして大きさを変更';
    resize.textContent = '↙';
    resize.addEventListener('pointerdown', function(e) {
      e.preventDefault();
      e.stopPropagation();
      var startX = e.clientX;
      var startWidth = shell.getBoundingClientRect().width;
      resize.setPointerCapture(e.pointerId);

      function onMove(moveEvent) {
        var requestedWidth = startWidth + (startX - moveEvent.clientX);
        globalVideo.userWidth = Math.max(240, requestedWidth);
        updateGlobalVideoPosition();
      }
      function onEnd(endEvent) {
        resize.releasePointerCapture(endEvent.pointerId);
        resize.removeEventListener('pointermove', onMove);
        resize.removeEventListener('pointerup', onEnd);
        resize.removeEventListener('pointercancel', onEnd);
      }
      resize.addEventListener('pointermove', onMove);
      resize.addEventListener('pointerup', onEnd);
      resize.addEventListener('pointercancel', onEnd);
    });

    shell.appendChild(viewport);
    shell.appendChild(close);
    shell.appendChild(resize);
    document.body.appendChild(shell);
    globalVideo.shell = shell;
    globalVideo.viewport = viewport;
    globalVideo.iframe = iframe;
  }

  function setIframeProfile(profile) {
    if (profile.kind === 'filmstrip') {
      globalVideo.iframe.style.width = '111.111%';
      globalVideo.iframe.style.height = '111.111%';
      globalVideo.iframe.style.transform = 'scale(0.9)';
    } else {
      globalVideo.iframe.style.width = '200%';
      globalVideo.iframe.style.height = '200%';
      globalVideo.iframe.style.transform = 'scale(0.5)';
    }
  }

  function setPlayerBox(left, top, width, height, docked) {
    var shell = globalVideo.shell;
    shell.style.left = Math.round(left) + 'px';
    shell.style.top = Math.round(top) + 'px';
    shell.style.width = Math.round(width) + 'px';
    shell.style.height = Math.round(height) + 'px';
    shell.classList.toggle('is-docked', docked);
    keepActiveTranscriptVisible();
  }

  function dockGlobalVideoPlayer() {
    var rightBoundary = window.innerWidth - 16;
    var availableWidth = Math.max(1, rightBoundary - 16);
    var requestedWidth = globalVideo.userWidth || 480;
    var maximumWidth = availableWidth;
    var transcript = document.querySelector('.transcript-panel');
    var activeCue = document.querySelector('.transcript-cue.is-active');
    if (transcript && activeCue) {
      var transcriptRect = transcript.getBoundingClientRect();
      var list = transcript.querySelector('.transcript-list');
      var transcriptVisible = window.innerWidth >= 1280 || transcript.classList.contains('is-open');
      if (transcriptVisible && list && rightBoundary > transcriptRect.left) {
        var listRect = list.getBoundingClientRect();
        var maximumBottom = listRect.bottom - activeCue.getBoundingClientRect().height - 20;
        maximumWidth = Math.min(maximumWidth, Math.max(240, (maximumBottom - 48) * 16 / 9));
      }
    }
    var dockWidth = Math.min(requestedWidth, maximumWidth);
    var dockHeight = dockWidth * 9 / 16;
    setPlayerBox(rightBoundary - dockWidth, 48, dockWidth, dockHeight, true);
  }

  function updateGlobalVideoPosition() {
    globalVideo.scheduled = false;
    if (!globalVideo.shell) return;
    if (globalVideo.forceDocked) {
      dockGlobalVideoPlayer();
      return;
    }
    if (!globalVideo.source) return;
    if (!document.documentElement.contains(globalVideo.source)) {
      stopGlobalVideo();
      return;
    }

    var rect = globalVideo.source.getBoundingClientRect();
    var profile = globalVideo.profile;
    var desired;
    if (profile.kind === 'filmstrip') {
      var filmWidth = globalVideo.userWidth || rect.width * 3;
      desired = { left: rect.left, top: rect.top, width: filmWidth, height: filmWidth * 9 / 16 };
    } else {
      var scale = 1.8;
      var width = globalVideo.userWidth || rect.width * scale;
      var height = width * 9 / 16;
      var extraWidth = width - rect.width;
      var left = rect.left;
      if (profile.origin === 'center') left -= extraWidth / 2;
      if (profile.origin === 'right') left -= extraWidth;
      desired = {
        left: left,
        top: rect.top - (height - rect.height) / 2,
        width: width,
        height: height
      };
    }

    var sourceOutside = rect.bottom <= 0 || rect.top >= window.innerHeight || rect.right <= 0 || rect.left >= window.innerWidth;
    var docked = sourceOutside || desired.top < 12;
    if (docked) {
      dockGlobalVideoPlayer();
    } else {
      setPlayerBox(desired.left, desired.top, desired.width, desired.height, false);
    }
  }

  function scheduleGlobalVideoPosition() {
    if (!globalVideo.shell || !globalVideo.shell.classList.contains('is-visible') || globalVideo.scheduled) return;
    globalVideo.scheduled = true;
    window.requestAnimationFrame(updateGlobalVideoPosition);
  }

  function startGlobalVideo(source, url, profile, forceDocked) {
    ensureGlobalVideoPlayer();
    forceDocked = !!forceDocked;
    if (globalVideo.source === source && globalVideo.iframe.src === url && globalVideo.forceDocked === forceDocked) return;
    if (globalVideo.source) globalVideo.source.classList.remove('is-playing');
    globalVideo.source = source;
    globalVideo.profile = profile;
    globalVideo.forceDocked = forceDocked;
    if (source) source.classList.add('is-playing');
    setIframeProfile(profile);
    globalVideo.shell.classList.add('is-visible');
    updateGlobalVideoPosition();
    // サイズ確定後に特殊watch URLを読み込む。autoplay指定は付けない。
    globalVideo.iframe.src = url;
  }

  function stopGlobalVideo() {
    if (globalVideo.source) globalVideo.source.classList.remove('is-playing');
    globalVideo.source = null;
    globalVideo.profile = null;
    globalVideo.forceDocked = false;
    if (globalVideo.iframe) globalVideo.iframe.src = '';
    if (globalVideo.shell) {
      globalVideo.shell.classList.remove('is-visible');
      globalVideo.shell.classList.remove('is-docked');
    }
  }

  window.addEventListener('scroll', scheduleGlobalVideoPosition, { passive: true });
  window.addEventListener('resize', scheduleGlobalVideoPosition);

  function startGlobalVideoAtTime(timestampSec) {
    var candidates = document.querySelectorAll('[data-thumb-start]');
    var nearest = null;
    var nearestDistance = Infinity;
    for (var i = 0; i < candidates.length; i++) {
      var candidateTime = Number(candidates[i].getAttribute('data-thumb-start'));
      var distance = Math.abs(candidateTime - timestampSec);
      if (distance < nearestDistance) {
        nearest = candidates[i];
        nearestDistance = distance;
      }
    }

    var profile = { kind: 'grid', origin: 'center' };
    if (nearest) {
      if (nearest.classList.contains('filmstrip-frame')) {
        profile = { kind: 'filmstrip' };
      } else {
        profile.origin = nearest.getAttribute('data-player-origin') || 'center';
      }
    }
    startGlobalVideo(nearest, makeVideoLink(baseUrl, Math.floor(timestampSec)), profile, true);
  }

  // --- タブタイトルをh1見出しから設定 ---
  if (!data.title) {
    var fallbackTitle = '';
    for (var ti = 0; ti < data.sections.length; ti++) {
      if (data.sections[ti].level === 1 && data.sections[ti].heading) {
        if (!fallbackTitle) fallbackTitle = data.sections[ti].heading;
        if (data.sections[ti].heading !== '動画のポイント') {
          document.title = data.sections[ti].heading;
          fallbackTitle = '';
          break;
        }
      }
    }
    if (fallbackTitle) document.title = fallbackTitle;
  }

  // --- サムネイル ---
  if (data.thumbnail) {
    var thumb = document.createElement('img');
    thumb.src = data.thumbnail;
    thumb.className = 'video-thumbnail';
    thumb.alt = 'Video Thumbnail';
    thumb.onerror = function() { this.style.display = 'none'; };
    document.body.appendChild(thumb);
  }

  // --- Description 構築関数（h1 直後に挿入するため関数化）---
  function makeDescLine(line) {
    var urlRe = /https?:\/\/[^\s)]+/g;
    if (!urlRe.test(line)) { return document.createTextNode(line + '\n'); }
    urlRe.lastIndex = 0;
    var frag = document.createDocumentFragment();
    var lastIdx = 0, m;
    while ((m = urlRe.exec(line)) !== null) {
      if (m.index > lastIdx) frag.appendChild(document.createTextNode(line.slice(lastIdx, m.index)));
      var a = document.createElement('a');
      a.href = m[0]; a.target = '_blank'; a.rel = 'noopener'; a.textContent = m[0];
      frag.appendChild(a);
      lastIdx = m.index + m[0].length;
    }
    if (lastIdx < line.length) frag.appendChild(document.createTextNode(line.slice(lastIdx)));
    frag.appendChild(document.createTextNode('\n'));
    return frag;
  }

  function buildDescriptionBlock() {
    if (!data.description) return null;
    var descDiv = document.createElement('div');
    descDiv.className = 'description-block';
    var descLines = data.description.split('\n');
    var VISIBLE_LINES = 5;
    var visibleDiv = document.createElement('div');
    visibleDiv.className = 'desc-visible';
    for (var di = 0; di < Math.min(VISIBLE_LINES, descLines.length); di++) {
      visibleDiv.appendChild(makeDescLine(descLines[di]));
    }
    descDiv.appendChild(visibleDiv);
    if (descLines.length > VISIBLE_LINES) {
      var descDetails = document.createElement('details');
      descDetails.className = 'desc-details';
      var descSummary = document.createElement('summary');
      descSummary.textContent = '続きを表示';
      descDetails.appendChild(descSummary);
      var moreDiv = document.createElement('div');
      moreDiv.className = 'desc-more';
      for (var di2 = VISIBLE_LINES; di2 < descLines.length; di2++) {
        moreDiv.appendChild(makeDescLine(descLines[di2]));
      }
      var closeBtn = document.createElement('button');
      closeBtn.className = 'desc-close-btn';
      closeBtn.textContent = '▲ 閉じる';
      (function(det) {
        closeBtn.addEventListener('click', function() { det.open = false; });
      })(descDetails);
      moreDiv.appendChild(closeBtn);
      descDetails.appendChild(moreDiv);
      descDiv.appendChild(descDetails);
    }
    return descDiv;
  }
  var descInserted = false;

  // --- 詳細へのジャンプリンク ---
  if (data.detail) {
    var jumpDiv = document.createElement('div');
    jumpDiv.className = 'jump-link';
    jumpDiv.innerHTML = "<a href='#detail-section'>📄 詳細に飛ぶ</a>";
    document.body.appendChild(jumpDiv);
  }

  // --- セクション描画 ---
  for (var i = 0; i < data.sections.length; i++) {
    var sec = data.sections[i];
    var sectionDiv = document.createElement('div');
    sectionDiv.className = 'timestamp-section';

    // 見出し
    if (sec.heading) {
      var level = sec.level || 2;
      if (level < 1) level = 1;
      if (level > 4) level = 4;
      var h = document.createElement('h' + level);
      h.textContent = sec.heading;
      if (sec.timestamp != null) h.setAttribute('data-ts', sec.timestamp);
      sectionDiv.appendChild(h);
    }

    // 本文 (HTML変換済み)
    if (sec.body) {
      var bodyDiv = document.createElement('div');
      bodyDiv.innerHTML = sec.body;
      sectionDiv.appendChild(bodyDiv);
    }

    // 画像グリッド（クリックで拡大プレイヤーを開く）
    if (sec.images && sec.images.length > 0) {
      var gridDiv = document.createElement('div');
      gridDiv.className = 'timestamp-images';
      for (var j = 0; j < sec.images.length; j++) {
        var img = sec.images[j];
        var startSec = Math.floor(img.start);
        var clickUrl = makeVideoLink(baseUrl, startSec);

        var container = document.createElement('div');
        container.className = 'thumb-container';
        container.setAttribute('data-url', clickUrl);
        container.setAttribute('data-thumb-start', startSec);
        container.setAttribute('data-player-origin', j % 3 === 0 ? 'left' : (j % 3 === 1 ? 'center' : 'right'));

        var thumbImg = document.createElement('img');
        thumbImg.className = 'thumb-img';
        thumbImg.src = img.src;
        thumbImg.loading = 'lazy';

        container.appendChild(thumbImg);
        gridDiv.appendChild(container);

        container.addEventListener('click', function(e) {
          e.preventDefault();
          startGlobalVideo(this, this.getAttribute('data-url'), {
            kind: 'grid',
            origin: this.getAttribute('data-player-origin')
          });
        });
      }
      sectionDiv.appendChild(gridDiv);
    }

    // 動画リンク
    if (sec.timestamp != null) {
      var linkP = document.createElement('p');
      var linkA = document.createElement('a');
      linkA.href = makeVideoLink(baseUrl, sec.timestamp);
      linkA.setAttribute('data-video-time', sec.timestamp);
      linkA.textContent = '▶ 動画：' + formatTimestamp(sec.timestamp);
      linkA.addEventListener('click', function(e) {
        e.preventDefault();
        startGlobalVideoAtTime(Number(this.getAttribute('data-video-time')));
      });
      linkP.appendChild(linkA);
      sectionDiv.appendChild(linkP);
    }

    document.body.appendChild(sectionDiv);

    // タイトルセクションの直後に description を挿入
    if (!descInserted && data.title && sec.heading === data.title) {
      descInserted = true;
      var db = buildDescriptionBlock();
      if (db) document.body.appendChild(db);
    }
  }

  // --- 詳細セクション ---
  if (data.detail) {
    var detailDiv = document.createElement('div');
    detailDiv.id = 'detail-section';
    detailDiv.className = 'detail-section';
    detailDiv.innerHTML = '<h2>📄 詳細内容</h2>' + data.detail;
    document.body.appendChild(detailDiv);
  }

  // --- 右レール：見出し時刻と緩く同期する字幕タイムライン ---
  function buildTranscript() {
    var cues = data.transcript || [];
    if (!cues.length) return;

    var panel = document.createElement('aside');
    panel.className = 'transcript-panel';
    panel.setAttribute('aria-label', '字幕タイムライン');

    var header = document.createElement('div');
    header.className = 'transcript-header';
    var titleEl = document.createElement('div');
    titleEl.className = 'transcript-title';
    titleEl.textContent = '字幕';
    var syncLabel = document.createElement('span');
    syncLabel.className = 'transcript-sync-label';
    syncLabel.textContent = '本文と同期';
    var closeButton = document.createElement('button');
    closeButton.className = 'transcript-close';
    closeButton.type = 'button';
    closeButton.setAttribute('aria-label', '字幕を閉じる');
    closeButton.textContent = '×';
    header.appendChild(titleEl);
    header.appendChild(syncLabel);
    header.appendChild(closeButton);
    panel.appendChild(header);

    var list = document.createElement('div');
    list.className = 'transcript-list';
    var sectionTimes = [];
    for (var si = 0; si < data.sections.length; si++) {
      if (data.sections[si].timestamp != null) sectionTimes.push(Number(data.sections[si].timestamp));
    }
    sectionTimes.sort(function(a, b) { return a - b; });
    var boundaryIndexes = {};
    var cueIndex = 0;
    for (var st = 0; st < sectionTimes.length; st++) {
      while (cueIndex < cues.length - 1 && Number(cues[cueIndex].start) < sectionTimes[st]) cueIndex++;
      boundaryIndexes[cueIndex] = true;
    }

    var cueElements = [];
    for (var ci = 0; ci < cues.length; ci++) {
      var cue = cues[ci];
      var row = document.createElement('a');
      row.className = 'transcript-cue' + (boundaryIndexes[ci] ? ' is-section-start' : '');
      row.href = makeVideoLink(baseUrl, Math.floor(cue.start));
      row.setAttribute('data-transcript-index', ci);
      row.setAttribute('data-cue-start', cue.start);
      row.addEventListener('click', function(e) {
        e.preventDefault();
        if (window.innerWidth < 1280) setPanelOpen(false);
        startGlobalVideoAtTime(Number(this.getAttribute('data-cue-start')));
      });
      var time = document.createElement('span');
      time.className = 'transcript-time';
      time.textContent = formatClock(cue.start);
      var textEl = document.createElement('span');
      textEl.className = 'transcript-text';
      textEl.textContent = cue.text;
      row.appendChild(time);
      row.appendChild(textEl);
      list.appendChild(row);
      cueElements.push(row);
    }
    panel.appendChild(list);
    document.body.appendChild(panel);

    var toggle = document.createElement('button');
    toggle.className = 'transcript-toggle';
    toggle.type = 'button';
    toggle.textContent = '字幕';
    toggle.setAttribute('aria-label', '字幕タイムラインを開く');
    document.body.appendChild(toggle);

    function setPanelOpen(open) {
      panel.classList.toggle('is-open', open);
      document.body.classList.toggle('transcript-open', open);
    }
    toggle.addEventListener('click', function() { setPanelOpen(true); });
    closeButton.addEventListener('click', function() { setPanelOpen(false); });

    var anchors = [];
    function rebuildAnchors() {
      anchors = [];
      var hs = document.querySelectorAll('[data-ts]');
      for (var hi = 0; hi < hs.length; hi++) {
        var anchorTime = parseFloat(hs[hi].getAttribute('data-ts'));
        if (isNaN(anchorTime)) continue;
        anchors.push({
          t: anchorTime,
          y: hs[hi].getBoundingClientRect().top + window.pageYOffset
        });
      }
      anchors.sort(function(a, b) { return a.t - b.t; });
      if (!anchors.length) return;
      var endTime = Math.max(Number(data.duration) || 0, Number(cues[cues.length - 1].end) || 0, anchors[anchors.length - 1].t + 1);
      anchors.push({ t: endTime, y: Math.max(document.documentElement.scrollHeight, anchors[anchors.length - 1].y + 1) });
    }

    function yToTime(y) {
      if (!anchors.length) return 0;
      if (y <= anchors[0].y) return anchors[0].t;
      for (var ai = 0; ai < anchors.length - 1; ai++) {
        var a = anchors[ai], b = anchors[ai + 1];
        if (y >= a.y && y <= b.y) {
          return b.y === a.y ? a.t : a.t + (y - a.y) / (b.y - a.y) * (b.t - a.t);
        }
      }
      return anchors[anchors.length - 1].t;
    }

    var activeIndex = -1;
    var manualUntil = 0;
    var scheduled = false;
    keepActiveTranscriptVisible = function() {
      if (activeIndex < 0 || !globalVideo.shell || !globalVideo.shell.classList.contains('is-visible')) return;
      var panelRect = panel.getBoundingClientRect();
      var playerRect = globalVideo.shell.getBoundingClientRect();
      var listRect = list.getBoundingClientRect();
      var overlapsHorizontally = playerRect.right > panelRect.left && playerRect.left < panelRect.right;
      var overlapsList = playerRect.bottom > listRect.top && playerRect.top < listRect.bottom;
      if (!overlapsHorizontally || !overlapsList) return;

      var active = cueElements[activeIndex];
      var activeRect = active.getBoundingClientRect();
      var safeTop = Math.max(listRect.top + 8, playerRect.bottom + 12);
      var latestTop = listRect.bottom - activeRect.height - 8;
      var targetTop = Math.min(safeTop, latestTop);
      if (activeRect.top < safeTop || activeRect.bottom > listRect.bottom - 8) {
        list.scrollTop = Math.max(0, list.scrollTop + activeRect.top - targetTop);
      }
    };
    function syncTranscript() {
      scheduled = false;
      var markerY = window.pageYOffset + window.innerHeight * 0.3;
      var currentTime = yToTime(markerY);
      var low = 0, high = cues.length - 1, found = 0;
      while (low <= high) {
        var mid = Math.floor((low + high) / 2);
        if (Number(cues[mid].start) <= currentTime) { found = mid; low = mid + 1; }
        else { high = mid - 1; }
      }
      if (found === activeIndex) return;
      if (activeIndex >= 0) cueElements[activeIndex].classList.remove('is-active');
      activeIndex = found;
      cueElements[activeIndex].classList.add('is-active');
      if (Date.now() >= manualUntil) {
        list.scrollTop = Math.max(0, cueElements[activeIndex].offsetTop - list.clientHeight * 0.3);
      }
      keepActiveTranscriptVisible();
    }

    function scheduleSync() {
      if (scheduled) return;
      scheduled = true;
      window.requestAnimationFrame(syncTranscript);
    }
    function pauseAutoSync() { manualUntil = Date.now() + 4000; }
    list.addEventListener('wheel', pauseAutoSync, { passive: true });
    list.addEventListener('pointerdown', pauseAutoSync);
    list.addEventListener('touchstart', pauseAutoSync, { passive: true });
    window.addEventListener('scroll', scheduleSync, { passive: true });
    window.addEventListener('resize', function() { rebuildAnchors(); scheduleSync(); });
    window.addEventListener('load', function() { rebuildAnchors(); scheduleSync(); });
    rebuildAnchors();
    scheduleSync();
  }

  function formatClock(sec) {
    sec = Math.max(0, Math.floor(Number(sec) || 0));
    var h = Math.floor(sec / 3600);
    var m = Math.floor((sec % 3600) / 60);
    var s = sec % 60;
    if (h) return h + ':' + (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s;
    return m + ':' + (s < 10 ? '0' : '') + s;
  }

  buildTranscript();

  // --- 左レール：全ストーリーボードを時刻で本文に合わせて並べる ---
  function buildFilmstrip() {
    var frames = data.filmstrip;
    var old = document.getElementById('filmstrip-rail');
    if (old) {
      if (globalVideo.source && old.contains(globalVideo.source)) stopGlobalVideo();
      old.parentNode.removeChild(old);
    }
    if (!frames || !frames.length || !videoId) return;
    // 狭い画面（左マージンが取れない）では作らない
    if (window.innerWidth < 1180) return;

    // 見出しを「時刻↔Y座標」のアンカーにする
    var anchors = [];
    var hs = document.querySelectorAll('[data-ts]');
    for (var i = 0; i < hs.length; i++) {
      var t = parseFloat(hs[i].getAttribute('data-ts'));
      if (isNaN(t)) continue;
      anchors.push({ t: t, y: hs[i].getBoundingClientRect().top + window.pageYOffset });
    }
    if (!anchors.length) return;
    anchors.sort(function(a, b) { return a.t - b.t; });
    // 先頭(0,0)と末尾(動画終端, ページ下端)を補う
    if (anchors[0].t > 0) anchors.unshift({ t: 0, y: 0 });
    var last = frames[frames.length - 1];
    var endT = Math.max(data.duration || 0, last.end || last.start || 0, anchors[anchors.length - 1].t + 1);
    anchors.push({ t: endT, y: document.documentElement.scrollHeight });

    function timeToY(t) {
      if (t <= anchors[0].t) return anchors[0].y;
      for (var k = 0; k < anchors.length - 1; k++) {
        var a = anchors[k], b = anchors[k + 1];
        if (t >= a.t && t <= b.t) {
          return b.t === a.t ? a.y : a.y + (t - a.t) / (b.t - a.t) * (b.y - a.y);
        }
      }
      return anchors[anchors.length - 1].y;
    }

    var rail = document.createElement('div');
    rail.id = 'filmstrip-rail';
    rail.className = 'filmstrip-rail';
    document.body.appendChild(rail);
    var railTop = rail.getBoundingClientRect().top + window.pageYOffset;

    var MIN_GAP = 90; // フレーム高さ(83)＋余白。これより詰まる分は間引く
    var lastY = -Infinity;
    for (var j = 0; j < frames.length; j++) {
      var f = frames[j];
      var y = timeToY(f.start);
      if (y - lastY < MIN_GAP) continue; // 重なる分は自動間引き
      lastY = y;

      var frame = document.createElement('div');
      frame.className = 'filmstrip-frame';
      frame.style.top = (y - railTop) + 'px';
      frame.setAttribute('data-url', makeVideoLink(baseUrl, Math.floor(f.start)));
      frame.setAttribute('data-thumb-start', f.start);
      var im = document.createElement('img');
      im.src = f.src;
      im.loading = 'lazy';
      im.alt = '';
      im.onerror = function() { this.style.display = 'none'; };
      frame.appendChild(im);

      frame.addEventListener('click', function(e) {
        e.preventDefault();
        startGlobalVideo(this, this.getAttribute('data-url'), { kind: 'filmstrip' });
      });

      rail.appendChild(frame);
    }
  }

  buildFilmstrip();
  // 画像読込でレイアウトが確定した後に再計算（アンカーY座標がずれるため）
  window.addEventListener('load', buildFilmstrip);

  // --- makeEmbedUrl, embedParams は不要になったが互換性のため残す ---
})();
</script>
</body>
</html>
